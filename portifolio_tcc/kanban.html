<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban - TCC</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(rgba(0,32,88,0.85), rgba(0,32,88,0.85)), url("background.jpg");
  background-size: cover;
  background-position: center;
  color: white;
  min-height: 100vh;
}

/* ── NAVBAR ── */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 25px 80px;
}

.logo {
  font-size: 42px;
  letter-spacing: 10px;
  font-weight: bold;
  color: white;
}

.menu a {
  text-decoration: none;
  color: white;
  margin-left: 40px;
  font-size: 18px;
  padding: 10px 20px;
  background: linear-gradient(45deg,#0A1F44,#1E3A70);
  border-radius: 30px;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(255,215,0,0.3);
  display: inline-block;
}

.menu a:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px rgba(255,215,0,0.6);
}

/* ── CONTAINER ── */
.container {
  max-width: 1200px;
  margin: 40px auto;
  padding: 20px;
}

.title {
  font-size: 36px;
  text-align: center;
  margin-bottom: 30px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* ── ADD CARD FORM ── */
.add-form {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

.add-form input,
.add-form select {
  padding: 10px 16px;
  border-radius: 8px;
  border: 1px solid rgba(255,215,0,0.4);
  background: rgba(10,31,68,0.9);
  color: white;
  font-size: 15px;
  outline: none;
}

.add-form input { width: 320px; }

.add-form select option { background: #0A1F44; }

.add-form button {
  padding: 10px 24px;
  background: linear-gradient(45deg,#0A1F44,#1E3A70);
  color: white;
  border: none;
  border-radius: 30px;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(255,215,0,0.3);
}

.add-form button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(255,215,0,0.6);
}

/* ── KANBAN BOARD ── */
.board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.column {
  background: rgba(10,31,68,0.9);
  border-radius: 15px;
  padding: 20px;
  border: 1px solid rgba(255,215,0,0.3);
  box-shadow: 0 0 10px rgba(255,215,0,0.2);
  min-height: 400px;
  transition: 0.3s;
}

.column.drag-over {
  border-color: #FFD700;
  box-shadow: 0 0 20px rgba(255,215,0,0.5);
}

.col-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid rgba(255,215,0,0.4);
}

.col-header h2 {
  font-size: 18px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.col-badge {
  background: rgba(255,215,0,0.2);
  border: 1px solid rgba(255,215,0,0.5);
  color: #FFD700;
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 13px;
  font-weight: bold;
}

/* ── CARD ── */
.card {
  background: rgba(30,58,112,0.85);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 12px;
  border: 1px solid rgba(255,215,0,0.2);
  box-shadow: 0 0 8px rgba(255,215,0,0.1);
  cursor: grab;
  transition: 0.2s;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}

.card:hover {
  transform: scale(1.02);
  border-color: rgba(255,215,0,0.5);
  box-shadow: 0 0 16px rgba(255,215,0,0.3);
}

.card.dragging {
  opacity: 0.5;
  cursor: grabbing;
}

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}

.card-text {
  font-size: 15px;
  line-height: 1.5;
  flex: 1;
}

.card-del {
  background: none;
  border: none;
  color: rgba(255,255,255,0.35);
  font-size: 18px;
  cursor: pointer;
  transition: 0.2s;
  padding: 0 4px;
  flex-shrink: 0;
}

.card-del:hover { color: #ff6b6b; }

.card-date {
  font-size: 11px;
  color: rgba(255,215,0,0.6);
  margin-top: 8px;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  color: rgba(255,255,255,0.25);
  font-size: 14px;
  margin-top: 40px;
  line-height: 2;
}

.empty-state span { font-size: 28px; display:block; margin-bottom:6px; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .board { grid-template-columns: 1fr; }
  .navbar { padding: 20px 24px; }
  .logo { font-size: 28px; }
  .add-form input { width: 100%; }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">T C C</div>
  <div class="menu">
    <a href="index.html">Voltar</a>
  </div>
</div>

<!-- MAIN -->
<div class="container">
  <h1 class="title">Quadro Kanban</h1>

  <!-- ADD CARD -->
  <div class="add-form">
    <input type="text" id="cardInput" placeholder="Nova tarefa...">
    <select id="colSelect">
      <option value="todo">A Fazer</option>
      <option value="doing">Em Andamento</option>
      <option value="done">Concluído</option>
    </select>
    <button onclick="addCard()">+ Adicionar</button>
  </div>

  <!-- BOARD -->
  <div class="board">

    <!-- A FAZER -->
    <div class="column" id="todo" ondragover="onDragOver(event)" ondrop="onDrop(event,'todo')" ondragleave="onDragLeave(event)">
      <div class="col-header">
        <h2>📋 A Fazer</h2>
        <span class="col-badge" id="badge-todo">0</span>
      </div>
      <div class="cards" id="cards-todo">
        <div class="empty-state"><span>📌</span>Nenhuma tarefa ainda</div>
      </div>
    </div>

    <!-- EM ANDAMENTO -->
    <div class="column" id="doing" ondragover="onDragOver(event)" ondrop="onDrop(event,'doing')" ondragleave="onDragLeave(event)">
      <div class="col-header">
        <h2>⚙️ Em Andamento</h2>
        <span class="col-badge" id="badge-doing">0</span>
      </div>
      <div class="cards" id="cards-doing">
        <div class="empty-state"><span>🔧</span>Nenhuma tarefa em progresso</div>
      </div>
    </div>

    <!-- CONCLUÍDO -->
    <div class="column" id="done" ondragover="onDragOver(event)" ondrop="onDrop(event,'done')" ondragleave="onDragLeave(event)">
      <div class="col-header">
        <h2>✅ Concluído</h2>
        <span class="col-badge" id="badge-done">0</span>
      </div>
      <div class="cards" id="cards-done">
        <div class="empty-state"><span>🎉</span>Nenhuma tarefa concluída</div>
      </div>
    </div>

  </div>
</div>

<script>
// ── STATE ──
let tasks = JSON.parse(localStorage.getItem('kanban-tasks')) || [];
let dragId = null;

function save() {
  localStorage.setItem('kanban-tasks', JSON.stringify(tasks));
}

function newId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ── RENDER ──
function render() {
  const cols = ['todo','doing','done'];

  cols.forEach(col => {
    const container = document.getElementById('cards-' + col);
    const colTasks  = tasks.filter(t => t.col === col);

    document.getElementById('badge-' + col).textContent = colTasks.length;

    if (colTasks.length === 0) {
      const labels = { todo:'Nenhuma tarefa ainda', doing:'Nenhuma tarefa em progresso', done:'Nenhuma tarefa concluída' };
      const icons  = { todo:'📌', doing:'🔧', done:'🎉' };
      container.innerHTML = `<div class="empty-state"><span>${icons[col]}</span>${labels[col]}</div>`;
      return;
    }

    container.innerHTML = '';
    colTasks.forEach(task => {
      const card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('draggable', 'true');
      card.dataset.id = task.id;

      card.innerHTML = `
        <div class="card-top">
          <div class="card-text">${escapeHtml(task.text)}</div>
          <button class="card-del" onclick="deleteCard('${task.id}')" title="Excluir">✕</button>
        </div>
        <div class="card-date">${task.date}</div>
      `;

      card.addEventListener('dragstart', e => {
        dragId = task.id;
        setTimeout(() => card.classList.add('dragging'), 0);
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        dragId = null;
      });

      container.appendChild(card);
    });
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── ADD ──
function addCard() {
  const input = document.getElementById('cardInput');
  const col   = document.getElementById('colSelect').value;
  const text  = input.value.trim();
  if (!text) return;

  const now = new Date();
  const date = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});

  tasks.push({ id: newId(), text, col, date });
  save();
  render();
  input.value = '';
  input.focus();
}

document.getElementById('cardInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addCard();
});

// ── DELETE ──
function deleteCard(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

// ── DRAG & DROP ──
function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e, targetCol) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragId) return;
  const task = tasks.find(t => t.id === dragId);
  if (task) { task.col = targetCol; save(); render(); }
}

// ── INIT ──
render();
</script>
</body>
</html>
